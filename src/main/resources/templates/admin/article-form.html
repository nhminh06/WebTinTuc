<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Viết bài')}"></head>
<body>
<header th:replace="~{fragments/layout :: header}"></header>
<main class="main-content">
<div class="container">
    <div class="admin-header">
        <h2 th:text="${article.id != null} ? 'Chỉnh sửa bài viết' : 'Viết bài mới'">Viết bài</h2>
        <a href="/admin" class="btn-secondary">← Quay lại</a>
    </div>

    <form th:action="@{/admin/articles/save}" th:object="${article}" method="post" class="article-form">
        <input type="hidden" th:field="*{id}"/>
        <input type="hidden" th:field="*{viewCount}"/>
        <input type="hidden" th:field="*{createdAt}"/>

        <div class="form-group">
            <label>Tiêu đề *</label>
            <input type="text" th:field="*{title}" placeholder="Nhập tiêu đề bài viết..." class="form-control"/>
            <span class="error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></span>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Danh mục</label>
                <select th:field="*{category}" class="form-control">
                    <option value="">-- Chọn danh mục --</option>
                    <option value="Công nghệ">Công nghệ</option>
                    <option value="Thể thao">Thể thao</option>
                    <option value="Kinh tế">Kinh tế</option>
                    <option value="Giải trí">Giải trí</option>
                    <option value="Xã hội">Xã hội</option>
                </select>
            </div>
            <div class="form-group">
                <label>Tác giả</label>
                <input type="text" th:field="*{author}" placeholder="Tên tác giả" class="form-control"/>
            </div>
        </div>

        <div class="form-group">
            <label>URL ảnh bìa</label>
            <input type="text" th:field="*{imageUrl}" placeholder="https://..." class="form-control"/>
        </div>

        <div class="form-group">
            <label>Tóm tắt *</label>
            <textarea th:field="*{summary}" rows="3" placeholder="Tóm tắt ngắn gọn..." class="form-control"></textarea>
            <span class="error" th:if="${#fields.hasErrors('summary')}" th:errors="*{summary}"></span>
        </div>

        <div class="form-group">
            <label>Nội dung *</label>
            <textarea th:field="*{content}" rows="12" placeholder="Nội dung bài viết (hỗ trợ HTML)..." class="form-control" id="contentEditor"></textarea>
            <span class="error" th:if="${#fields.hasErrors('content')}" th:errors="*{content}"></span>
        </div>

        <div class="form-group checkbox-group">
            <label class="checkbox-label">
                <input type="checkbox" th:field="*{published}"/> Đăng ngay
            </label>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn-primary">
                <span th:text="${article.id != null} ? '💾 Cập nhật' : '🚀 Đăng bài'">Lưu</span>
            </button>
            <a href="/admin" class="btn-secondary">Hủy</a>
        </div>
    </form>
</div>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
