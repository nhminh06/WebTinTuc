<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Admin')}"></head>
<body>
<header th:replace="~{fragments/layout :: header}"></header>
<main class="main-content">
<div class="container">
    <div class="admin-header">
        <h2>⚙ Quản trị</h2>
        <a href="/admin/articles/new" class="btn-primary">+ Viết bài mới</a>
    </div>
    <div class="admin-stats">
        <div class="stat-card">
            <span class="stat-number" th:text="${totalArticles}">0</span>
            <span class="stat-label">Tổng bài viết</span>
        </div>
    </div>
    <div class="flash-msg success" th:if="${success}" th:text="${success}"></div>
    <table class="admin-table">
        <thead>
            <tr>
                <th>ID</th><th>Tiêu đề</th><th>Danh mục</th><th>Tác giả</th><th>Trạng thái</th><th>Lượt xem</th><th>Hành động</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="article : ${articles}">
                <td th:text="${article.id}">1</td>
                <td><span th:text="${article.title}">Tiêu đề</span></td>
                <td th:text="${article.category}">Danh mục</td>
                <td th:text="${article.author}">Tác giả</td>
                <td>
                    <a th:href="@{/admin/articles/toggle/{id}(id=${article.id})}"
                       th:class="${article.published} ? 'badge published' : 'badge draft'"
                       th:text="${article.published} ? 'Đã đăng' : 'Nháp'">Trạng thái</a>
                </td>
                <td th:text="${article.viewCount}">0</td>
                <td class="action-btns">
                    <a th:href="@{/article/{id}(id=${article.id})}" class="btn-sm">Xem</a>
                    <a th:href="@{/admin/articles/edit/{id}(id=${article.id})}" class="btn-sm edit">Sửa</a>
                    <a th:href="@{/admin/articles/delete/{id}(id=${article.id})}"
                       class="btn-sm danger"
                       onclick="return confirm('Xóa bài viết này?')">Xóa</a>
                </td>
            </tr>
        </tbody>
    </table>
    <div style="margin-top:1rem">
        <a href="/admin/articles" class="btn-secondary">Xem tất cả bài viết →</a>
    </div>
</div>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
