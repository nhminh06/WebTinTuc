<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Đăng nhập')}"></head>
<body>
<header th:replace="~{fragments/layout :: header}"></header>

<main class="auth-page">
    <div class="auth-card">
        <h2 class="auth-title">Đăng nhập</h2>

        <div th:if="${error}" class="auth-alert auth-alert--error" th:text="${error}"></div>
        <div th:if="${logout}" class="auth-alert auth-alert--success" th:text="${logout}"></div>

        <form action="/login" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="auth-field">
                <label>Tên đăng nhập</label>
                <input type="text" name="username" required autofocus placeholder="Nhập tên đăng nhập"/>
            </div>
            <div class="auth-field">
                <label>Mật khẩu</label>
                <input type="password" name="password" required placeholder="Nhập mật khẩu"/>
            </div>

            <button type="submit" class="auth-btn">Đăng nhập</button>
        </form>

        <p class="auth-link">Chưa có tài khoản? <a href="/register">Đăng ký ngay</a></p>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script th:replace="~{fragments/layout :: scripts}"></script>
</body>
</html>
