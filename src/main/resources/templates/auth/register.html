<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Đăng ký')}"></head>
<body>
<header th:replace="~{fragments/layout :: header}"></header>

<main class="auth-page">
    <div class="auth-card">
        <h2 class="auth-title">Đăng ký tài khoản</h2>

        <div th:if="${error}" class="auth-alert auth-alert--error" th:text="${error}"></div>
        <div th:if="${success}" class="auth-alert auth-alert--success" th:text="${success}"></div>

        <form action="/register" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="auth-field">
                <label>Tên đăng nhập</label>
                <input type="text" name="username" required minlength="3" maxlength="50"
                       placeholder="3-50 ký tự"/>
            </div>
            <div class="auth-field">
                <label>Email</label>
                <input type="email" name="email" required placeholder="example@email.com"/>
            </div>
            <div class="auth-field">
                <label>Mật khẩu</label>
                <input type="password" name="password" required minlength="6"
                       placeholder="Tối thiểu 6 ký tự"/>
            </div>
            <div class="auth-field">
                <label>Xác nhận mật khẩu</label>
                <input type="password" name="confirmPassword" required placeholder="Nhập lại mật khẩu"/>
            </div>

            <button type="submit" class="auth-btn">Đăng ký</button>
        </form>

        <p class="auth-link">Đã có tài khoản? <a href="/login">Đăng nhập</a></p>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script th:replace="~{fragments/layout :: scripts}"></script>
</body>
</html>
