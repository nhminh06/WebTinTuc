<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Bài viết của tôi')}"></head>
<body>
<div th:replace="~{fragments/layout :: header}"></div>

<div class="user-layout">
    <div th:replace="~{fragments/user-sidebar :: sidebar('articles')}"></div>

    <main class="user-main">
        <div class="user-topbar">
            <h2><i class="fa-solid fa-newspaper"></i> Bài viết của tôi</h2>
            <a href="/user/articles/new" class="btn-primary">
                <i class="fa-solid fa-plus"></i> Viết bài mới
            </a>
        </div>

        <div class="flash-msg success" th:if="${success}" th:text="${success}"></div>

        <div class="admin-card">
            <table class="admin-table" style="table-layout:fixed; width:100%">
                <thead>
                <tr>
                    <th style="width:50px">ID</th>
                    <th style="width:250px">Tiêu đề</th>
                    <th style="width:110px">Danh mục</th>
                    <th style="width:100px">Trạng thái</th>
                    <th style="width:110px">Ngày tạo</th>
                    <th style="width:130px">Hành động</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="article : ${articles}">
                    <td th:text="${article.id}"></td>
                    <td style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap"
                        th:text="${#strings.abbreviate(article.title, 50)}"></td>
                    <td th:text="${article.category}"></td>
                    <td>
                        <span th:class="${article.status.name() == 'PUBLISHED'} ? 'badge published' :
                                       (${article.status.name() == 'HIDDEN'} ? 'badge hidden' : 'badge draft')"
                              th:text="${article.status.name() == 'PUBLISHED'} ? 'Đã đăng' :
                                      (${article.status.name() == 'HIDDEN'} ? 'Ẩn' : 'Nháp')">
                        </span>
                    </td>
                    <td th:text="${#temporals.format(article.createdAt, 'dd/MM/yyyy')}"></td>
                    <td>
                        <div class="action-btns">
                            <a th:href="@{/article/{id}(id=${article.id})}"
                               class="btn-sm" target="_blank">
                                <i class="fa-solid fa-eye"></i>
                            </a>
                            <a th:href="@{/user/articles/edit/{id}(id=${article.id})}"
                               class="btn-sm edit">
                                <i class="fa-solid fa-pen"></i>
                            </a>
                            <a th:href="@{/user/articles/delete/{id}(id=${article.id})}"
                               class="btn-sm danger"
                               onclick="return confirm('Xóa bài viết này?')">
                                <i class="fa-solid fa-trash"></i>
                            </a>
                        </div>
                    </td>
                </tr>
                <tr th:if="${articles.isEmpty()}">
                    <td colspan="6" style="text-align:center; padding:2rem; color:var(--text-muted)">
                        <i class="fa-solid fa-newspaper"></i> Chưa có bài viết nào
                    </td>
                </tr>
                </tbody>
            </table>

            <div class="pagination" style="padding:1rem" th:if="${articles.totalPages > 1}">
                <a th:if="${articles.hasPreviousPage()}"
                   th:href="@{/user/articles(page=${articles.number - 1})}"
                   class="btn-page">← Trước</a>
                <span th:each="i : ${#numbers.sequence(0, articles.totalPages - 1)}">
                    <a th:href="@{/user/articles(page=${i})}"
                       th:text="${i + 1}"
                       th:classappend="${i == articles.number} ? ' active'"
                       class="btn-page"></a>
                </span>
                <a th:if="${articles.hasNextPage()}"
                   th:href="@{/user/articles(page=${articles.number + 1})}"
                   class="btn-page">Sau →</a>
            </div>
        </div>
    </main>
</div>

<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
