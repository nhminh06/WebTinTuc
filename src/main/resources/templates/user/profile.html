<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Trang cá nhân')}"></head>
<body>

<div th:replace="~{fragments/layout :: header}"></div>

<div class="user-layout">

    <!-- SIDEBAR -->
    <div th:replace="~{fragments/user-sidebar :: sidebar('profile')}"></div>
    <!-- MAIN -->
    <main class="user-main">
        <div class="user-topbar">
            <h2><i class="fa-solid fa-circle-user"></i> Trang cá nhân</h2>
        </div>

        <div class="flash-msg success" th:if="${success}" th:text="${success}"></div>
        <div class="flash-msg error" th:if="${error}" th:text="${error}"></div>

        <!-- THỐNG KÊ -->
        <div class="admin-stats" style="margin-bottom:1.5rem">
            <div class="stat-card">
                <div class="stat-icon" style="background:#fff0f0">
                    <i class="fa-solid fa-newspaper" style="color:var(--red)"></i>
                </div>
                <div>
                    <span class="stat-number">0</span>
                    <span class="stat-label">Bài viết</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background:#f0fff4">
                    <i class="fa-solid fa-eye" style="color:#2e7d32"></i>
                </div>
                <div>
                    <span class="stat-number">0</span>
                    <span class="stat-label">Lượt xem</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background:#fffbf0">
                    <i class="fa-solid fa-bell" style="color:#f57f17"></i>
                </div>
                <div>
                    <span class="stat-number">3</span>
                    <span class="stat-label">Thông báo</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background:#f0f7ff">
                    <i class="fa-solid fa-calendar" style="color:#1565c0"></i>
                </div>
                <div>
                    <span class="stat-number" th:text="${#temporals.format(user.createdAt, 'dd/MM/yy')}"></span>
                    <span class="stat-label">Ngày tham gia</span>
                </div>
            </div>
        </div>

        <!-- THÔNG TIN -->
        <div class="admin-card">
            <div class="admin-card-header">
                <span><i class="fa-solid fa-id-card"></i> Thông tin tài khoản</span>
            </div>
            <form action="/profile/update" method="post"
                  style="padding:1.5rem; display:flex; flex-direction:column; gap:1.2rem">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div class="form-group">
                    <label class="form-label">Tên đăng nhập</label>
                    <input type="text" class="form-control" name="username" th:value="${user.username}"/>
                </div>

                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" name="email" th:value="${user.email}"/>
                </div>

                <div class="form-group">
                    <label class="form-label">
                        Mật khẩu mới
                        <small style="color:var(--text-secondary)">(để trống nếu không đổi)</small>
                    </label>
                    <input type="password" class="form-control" name="newPassword"
                           placeholder="Nhập mật khẩu mới..."/>
                </div>

                <div class="form-group">
                    <label class="form-label">Xác nhận mật khẩu mới</label>
                    <input type="password" class="form-control" name="confirmPassword"
                           placeholder="Nhập lại mật khẩu mới..."/>
                </div>

                <div>
                    <button type="submit" class="btn-primary">
                        <i class="fa-solid fa-floppy-disk"></i> Lưu thay đổi
                    </button>
                </div>
            </form>
        </div>

    </main>
</div>

<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
