<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Quản lý bài viết')}"></head>
<body>

<div class="admin-layout">
    <div th:replace="~{fragments/layout :: admin-sidebar}"></div>

    <main class="admin-main">
        <div class="admin-topbar">
            <h2><i class="fa-solid fa-newspaper"></i> Quản lý bài viết</h2>
            <a href="/admin/articles/new" class="btn-primary">
                <i class="fa-solid fa-plus"></i> Viết bài mới
            </a>
        </div>

        <div class="flash-msg success" th:if="${success}" th:text="${success}"></div>

        <div class="admin-card">
            <table class="admin-table">
                <thead>
                <tr>
                    <th style="width:50px">ID</th>
                    <th style="width:250px">Tiêu đề</th>  <!-- thêm width cố định -->
                    <th style="width:110px">Danh mục</th>
                    <th style="width:120px">Tác giả</th>
                    <th style="width:100px">Trạng thái</th>
                    <th style="width:110px">Ngày tạo</th>
                    <th style="width:130px">Hành động</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="article : ${articles}">
                    <td th:text="${article.id}">1</td>
                    <td th:text="${#strings.abbreviate(article.title, 60)}">Tiêu đề</td>
                    <td th:text="${article.category}">Danh mục</td>
                    <td th:text="${article.author}">Tác giả</td>
                    <td>
                        <a th:href="@{/admin/articles/toggle/{id}(id=${article.id})}"
                           th:class="${article.published} ? 'badge published' : 'badge draft'"
                           th:text="${article.published} ? 'Đã đăng' : 'Nháp'"></a>
                    </td>
                    <td th:text="${#temporals.format(article.createdAt, 'dd/MM/yyyy')}">Ngày</td>
                    <td>
                        <div class="action-btns">
                            <a th:href="@{/article/{id}(id=${article.id})}"
                               class="btn-sm" target="_blank">
                                <i class="fa-solid fa-eye"></i>
                            </a>
                            <a th:href="@{/admin/articles/edit/{id}(id=${article.id})}"
                               class="btn-sm edit">
                                <i class="fa-solid fa-pen"></i>
                            </a>
                            <a th:href="@{/admin/articles/delete/{id}(id=${article.id})}"
                               class="btn-sm danger"
                               onclick="return confirm('Xóa bài viết này?')">
                                <i class="fa-solid fa-trash"></i>
                            </a>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>

            <!-- Phân trang -->
            <div class="pagination" style="padding:1rem" th:if="${articles.totalPages > 1}">
                <a th:if="${articles.hasPreviousPage()}"
                   th:href="@{/admin/articles(page=${articles.number - 1})}"
                   class="btn-page">← Trước</a>
                <span th:each="i : ${#numbers.sequence(0, articles.totalPages - 1)}">
                    <a th:href="@{/admin/articles(page=${i})}"
                       th:text="${i + 1}"
                       th:classappend="${i == articles.number} ? ' active'"
                       class="btn-page"></a>
                </span>
                <a th:if="${articles.hasNextPage()}"
                   th:href="@{/admin/articles(page=${articles.number + 1})}"
                   class="btn-page">Sau →</a>
            </div>
        </div>

    </main>
</div>


<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
