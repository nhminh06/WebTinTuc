<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Quản lý liên hệ')}"></head>
<body>

<div class="admin-layout">
    <div th:replace="~{fragments/layout :: admin-sidebar}"></div>

    <main class="admin-main">
        <div class="admin-topbar">
            <h2><i class="fa-solid fa-envelope"></i> Quản lý liên hệ</h2>
        </div>

        <!-- FLASH -->
        <div class="flash-msg success" th:if="${success}" th:text="${success}"></div>
        <div class="flash-msg error"   th:if="${error}"   th:text="${error}"></div>

        <!-- STATS -->
        <div class="admin-stats" style="margin-bottom:1.5rem">
            <div class="stat-card">
                <div class="stat-icon" style="background:#fff0f0">
                    <i class="fa-solid fa-clock" style="color:var(--red)"></i>
                </div>
                <div>
                    <span class="stat-number" th:text="${countPending}">0</span>
                    <span class="stat-label">Chờ phản hồi</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background:#f0fff4">
                    <i class="fa-solid fa-check-circle" style="color:#2e7d32"></i>
                </div>
                <div>
                    <span class="stat-number" th:text="${contacts.totalElements - countPending}">0</span>
                    <span class="stat-label">Đã phản hồi</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background:#f0f7ff">
                    <i class="fa-solid fa-envelope-open" style="color:#1565c0"></i>
                </div>
                <div>
                    <span class="stat-number" th:text="${contacts.totalElements}">0</span>
                    <span class="stat-label">Tổng tin nhắn</span>
                </div>
            </div>
        </div>

        <!-- FILTER TABS -->
        <div class="admin-card" style="margin-bottom:1.2rem; padding:0.8rem 1.2rem">
            <div style="display:flex; gap:0.6rem; flex-wrap:wrap; align-items:center">
                <a th:href="@{/admin/contacts(status='PENDING')}"
                   th:class="${currentStatus == 'PENDING'} ? 'btn-primary' : 'btn-sm'">
                    <i class="fa-solid fa-clock"></i> Chờ phản hồi
                </a>
                <a th:href="@{/admin/contacts(status='REPLIED')}"
                   th:class="${currentStatus == 'REPLIED'} ? 'btn-primary' : 'btn-sm'">
                    <i class="fa-solid fa-check-circle"></i> Đã phản hồi
                </a>
                <a th:href="@{/admin/contacts}"
                   th:class="${currentStatus == null or currentStatus == ''} ? 'btn-primary' : 'btn-sm'">
                    <i class="fa-solid fa-list"></i> Tất cả
                </a>
            </div>
        </div>

        <!-- TABLE -->
        <div class="admin-card">
            <table class="admin-table" style="table-layout:fixed; width:100%">
                <thead>
                <tr>
                    <th style="width:50px">ID</th>
                    <th style="width:130px">Người gửi</th>
                    <th style="width:200px">Tiêu đề</th>
                    <th style="width:110px">Trạng thái</th>
                    <th style="width:120px">Ngày gửi</th>
                    <th style="width:120px">Hành động</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="c : ${contacts}">
                    <td th:text="${c.id}"></td>
                    <td style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap"
                        th:text="${c.senderUsername}"></td>
                    <td style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap"
                        th:text="${#strings.abbreviate(c.subject, 40)}"></td>
                    <td>
                        <span th:class="${c.status.name() == 'REPLIED'} ? 'badge published' : 'badge draft'"
                              th:text="${c.status.name() == 'REPLIED'} ? 'Đã phản hồi' : 'Chờ phản hồi'">
                        </span>
                    </td>
                    <td th:text="${#temporals.format(c.createdAt, 'dd/MM/yyyy HH:mm')}"></td>
                    <td>
                        <div class="action-btns">
                            <!-- Nút xem & phản hồi — dùng data-* thay th:onclick -->
                            <button class="btn-sm edit open-reply-modal"
                                    th:data-id="${c.id}"
                                    th:data-sender="${c.senderUsername}"
                                    th:data-subject="${c.subject}"
                                    th:data-message="${c.message}"
                                    th:data-reply="${c.reply != null ? c.reply : ''}"
                                    th:data-status="${currentStatus}"
                                    th:data-page="${contacts.number}"
                                    title="Xem & phản hồi">
                                <i class="fa-solid fa-reply"></i>
                            </button>
                            <!-- Nút xóa -->
                            <form th:action="@{/admin/contacts/delete/{id}(id=${c.id})}"
                                  method="post" style="display:inline"
                                  onsubmit="return confirm('Xóa tin nhắn này?')">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <input type="hidden" name="status" th:value="${currentStatus}"/>
                                <input type="hidden" name="page"   th:value="${contacts.number}"/>
                                <button type="submit" class="btn-sm danger" title="Xóa">
                                    <i class="fa-solid fa-trash"></i>
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>
                <tr th:if="${contacts.isEmpty()}">
                    <td colspan="6" style="text-align:center; padding:2rem; color:var(--text-muted)">
                        <i class="fa-solid fa-envelope-open"></i> Không có tin nhắn nào
                    </td>
                </tr>
                </tbody>
            </table>

            <!-- PAGINATION -->
            <div class="pagination" style="padding:1rem" th:if="${contacts.totalPages > 1}">
                <a th:if="${contacts.hasPreviousPage()}"
                   th:href="@{/admin/contacts(status=${currentStatus}, page=${contacts.number - 1})}"
                   class="btn-page">← Trước</a>
                <span th:each="i : ${#numbers.sequence(0, contacts.totalPages - 1)}">
                    <a th:href="@{/admin/contacts(status=${currentStatus}, page=${i})}"
                       th:text="${i + 1}"
                       th:classappend="${i == contacts.number} ? ' active'"
                       class="btn-page"></a>
                </span>
                <a th:if="${contacts.hasNextPage()}"
                   th:href="@{/admin/contacts(status=${currentStatus}, page=${contacts.number + 1})}"
                   class="btn-page">Sau →</a>
            </div>
        </div>
    </main>
</div>

<!-- MODAL XEM & PHẢN HỒI -->
<div id="replyModal" style="display:none; position:fixed; inset:0; z-index:9999;
     background:rgba(0,0,0,0.45); align-items:center; justify-content:center">
    <div style="background:#fff; border-radius:12px; width:100%; max-width:560px;
                margin:1rem; box-shadow:0 8px 32px rgba(0,0,0,0.18); overflow:hidden">

        <div style="background:var(--red); color:#fff; padding:1rem 1.4rem;
                    display:flex; justify-content:space-between; align-items:center">
            <span style="font-weight:600; font-size:1rem">
                <i class="fa-solid fa-envelope"></i> Chi tiết tin nhắn
            </span>
            <button onclick="closeModal()"
                    style="background:none; border:none; color:#fff; font-size:1.3rem;
                           cursor:pointer; line-height:1">&times;</button>
        </div>

        <div style="padding:1.4rem; display:flex; flex-direction:column; gap:1rem">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:0.8rem">
                <div>
                    <div style="font-size:0.75rem; color:var(--text-secondary); margin-bottom:2px">Người gửi</div>
                    <div id="modalSender" style="font-weight:600; color:var(--red)"></div>
                </div>
                <div>
                    <div style="font-size:0.75rem; color:var(--text-secondary); margin-bottom:2px">Tiêu đề</div>
                    <div id="modalSubject" style="font-weight:500"></div>
                </div>
            </div>

            <div>
                <div style="font-size:0.75rem; color:var(--text-secondary); margin-bottom:4px">Nội dung tin nhắn</div>
                <div id="modalMessage"
                     style="background:#f8f8f8; border-radius:8px; padding:0.9rem;
                            font-size:0.92rem; line-height:1.6; min-height:80px;
                            border:1px solid #eee; white-space:pre-wrap"></div>
            </div>

            <div id="existingReplyWrap" style="display:none">
                <div style="font-size:0.75rem; color:#2e7d32; margin-bottom:4px">
                    <i class="fa-solid fa-check-circle"></i> Phản hồi trước đó
                </div>
                <div id="existingReply"
                     style="background:#f0fff4; border-radius:8px; padding:0.9rem;
                            font-size:0.92rem; line-height:1.6;
                            border:1px solid #c8e6c9; white-space:pre-wrap"></div>
            </div>

            <form id="replyForm" method="post" style="display:flex; flex-direction:column; gap:0.8rem">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <input type="hidden" name="status" id="replyStatus"/>
                <input type="hidden" name="page"   id="replyPage"/>
                <div>
                    <label style="font-size:0.85rem; font-weight:500; margin-bottom:4px; display:block">
                        <i class="fa-solid fa-reply"></i> Nội dung phản hồi
                    </label>
                    <textarea id="replyTextarea" name="reply" rows="4"
                              class="form-control"
                              placeholder="Nhập nội dung phản hồi..."
                              style="resize:vertical"></textarea>
                </div>
                <div style="display:flex; gap:0.7rem; justify-content:flex-end">
                    <button type="button" onclick="closeModal()" class="btn-sm">Hủy</button>
                    <button type="submit" class="btn-primary">
                        <i class="fa-solid fa-paper-plane"></i> Gửi phản hồi
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
<script>
    // Dùng event delegation — đọc data-* attributes thay vì th:onclick
    document.querySelectorAll('.open-reply-modal').forEach(function(btn) {
        btn.addEventListener('click', function() {
            var id      = this.dataset.id;
            var sender  = this.dataset.sender;
            var subject = this.dataset.subject;
            var message = this.dataset.message;
            var reply   = this.dataset.reply;
            var status  = this.dataset.status;
            var page    = this.dataset.page;

            document.getElementById('modalSender').textContent  = sender;
            document.getElementById('modalSubject').textContent = subject;
            document.getElementById('modalMessage').textContent = message;
            document.getElementById('replyForm').action = '/admin/contacts/reply/' + id;
            document.getElementById('replyStatus').value = status || 'PENDING';
            document.getElementById('replyPage').value   = page   || '0';
            document.getElementById('replyTextarea').value = reply || '';

            var wrap = document.getElementById('existingReplyWrap');
            if (reply && reply.trim() !== '') {
                document.getElementById('existingReply').textContent = reply;
                wrap.style.display = 'block';
            } else {
                wrap.style.display = 'none';
            }

            var modal = document.getElementById('replyModal');
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        });
    });

    function closeModal() {
        document.getElementById('replyModal').style.display = 'none';
        document.body.style.overflow = '';
    }

    document.getElementById('replyModal').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });
</script>
</body>
</html>
