<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Quản lý người dùng')}"></head>
<body>
<div class="admin-layout">
    <div th:replace="~{fragments/layout :: admin-sidebar}"></div>

    <main class="admin-main">
        <!-- Topbar -->
        <div class="admin-topbar">
            <h2><i class="fa-solid fa-users"></i> Quản lý người dùng</h2>
            <span style="font-size:13px; color:var(--text-muted)">
                Tổng cộng <strong th:text="${totalUsers}">0</strong> tài khoản
            </span>
        </div>

        <!-- Flash -->
        <div th:if="${success}" class="flash-msg success">
            <i class="fa-solid fa-circle-check"></i>
            <span th:text="${success}"></span>
        </div>

        <!-- Stats -->
        <div class="admin-stats" style="grid-template-columns: repeat(3,1fr); margin-bottom:1.5rem;">
            <div class="stat-card">
                <div class="stat-icon" style="background:#eef2ff; color:#4361ee;">
                    <i class="fa-solid fa-users"></i>
                </div>
                <div>
                    <span class="stat-number" th:text="${totalUsers}">0</span>
                    <span class="stat-label">Tổng người dùng</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background:#eaf7ee; color:#1e7e36;">
                    <i class="fa-solid fa-user-check"></i>
                </div>
                <div>
                    <span class="stat-number" th:text="${totalEnabled}">0</span>
                    <span class="stat-label">Đang hoạt động</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background:#fff3e0; color:#d35400;">
                    <i class="fa-solid fa-user-slash"></i>
                </div>
                <div>
                    <span class="stat-number" th:text="${totalDisabled}">0</span>
                    <span class="stat-label">Đã khóa</span>
                </div>
            </div>
        </div>

        <!-- Search -->
        <div class="admin-card" style="margin-bottom:1.25rem; padding:1.1rem 1.35rem;">
            <form method="get" action="/admin/users" style="display:flex; gap:.75rem; align-items:center;">
                <div style="position:relative; flex:1; max-width:420px;">
                    <i class="fa-solid fa-magnifying-glass"
                       style="position:absolute; left:12px; top:50%; transform:translateY(-50%); color:#aaa; font-size:13px;"></i>
                    <input type="text" name="keyword" th:value="${keyword}"
                           placeholder="Tìm theo tên đăng nhập hoặc email..."
                           style="width:100%; padding:8px 12px 8px 34px; border:1px solid var(--border);
                                  border-radius:var(--radius-sm); font-size:14px; font-family:inherit;"/>
                </div>
                <button type="submit" class="btn-primary" style="padding:8px 20px; font-size:13.5px;">
                    <i class="fa-solid fa-search"></i> Tìm kiếm
                </button>
                <a th:if="${keyword != ''}" href="/admin/users"
                   class="btn-secondary" style="padding:8px 16px; font-size:13.5px;">
                    <i class="fa-solid fa-xmark"></i> Xóa lọc
                </a>
            </form>
        </div>

        <!-- Table -->
        <div class="admin-card">
            <div class="admin-card-header">
                <span><i class="fa-solid fa-list" style="color:var(--red);margin-right:6px;"></i>
                    Danh sách tài khoản
                    <span th:if="${keyword != ''}"
                          style="font-size:12px; color:var(--text-muted); font-weight:500;">
                        — kết quả cho "<span th:text="${keyword}"></span>"
                    </span>
                </span>
            </div>

            <div th:if="${users.totalElements == 0}"
                 style="padding:3rem; text-align:center; color:var(--text-muted);">
                <i class="fa-solid fa-users-slash" style="font-size:2rem; margin-bottom:.75rem; display:block;"></i>
                Không tìm thấy người dùng nào.
            </div>

            <table class="admin-table" th:if="${users.totalElements > 0}">
                <thead>
                <tr>
                    <th>#</th>
                    <th>Tên đăng nhập</th>
                    <th>Email</th>
                    <th>Vai trò</th>
                    <th>Trạng thái</th>
                    <th>Ngày tạo</th>
                    <th>Thao tác</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="user, stat : ${users.content}">
                    <td style="color:var(--text-muted); font-size:12px;"
                        th:text="${users.number * users.size + stat.index + 1}">1</td>

                    <td>
                        <div style="display:flex; align-items:center; gap:8px;">
                                <span style="width:32px; height:32px; border-radius:50%;
                                             background:var(--red-soft); color:var(--red);
                                             display:inline-flex; align-items:center;
                                             justify-content:center; font-weight:800; font-size:13px; flex-shrink:0;"
                                      th:text="${#strings.toUpperCase(#strings.substring(user.username,0,1))}">A</span>
                            <span style="font-weight:600;" th:text="${user.username}">username</span>
                        </div>
                    </td>

                    <td style="color:var(--text-muted);" th:text="${user.email}">email</td>

                    <!-- Role badge + inline change -->
                    <td>
                        <form th:action="@{/admin/users/role/{id}(id=${user.id})}"
                              method="post" style="display:inline-flex; align-items:center; gap:6px;">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <input type="hidden" name="keyword" th:value="${keyword}"/>
                            <input type="hidden" name="page" th:value="${users.number}"/>
                            <select name="role" onchange="this.form.submit()"
                                    style="border:1px solid var(--border); border-radius:999px;
                                               padding:3px 10px; font-size:12px; font-weight:700;
                                               cursor:pointer; background:#fff; font-family:inherit;"
                                    th:style="${user.role == 'ADMIN'}
                                            ? 'border:1px solid #c8ddf5; background:#eef2ff; color:#1565c0; border-radius:999px; padding:3px 10px; font-size:12px; font-weight:700; cursor:pointer; font-family:inherit;'
                                            : 'border:1px solid var(--border); background:#fff; border-radius:999px; padding:3px 10px; font-size:12px; font-weight:700; cursor:pointer; font-family:inherit;'">
                                <option value="USER"  th:selected="${user.role == 'USER'}">USER</option>
                                <option value="ADMIN" th:selected="${user.role == 'ADMIN'}">ADMIN</option>
                            </select>
                        </form>
                    </td>

                    <!-- Enabled toggle -->
                    <td>
                        <form th:action="@{/admin/users/toggle/{id}(id=${user.id})}"
                              method="post" style="display:inline;">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <input type="hidden" name="keyword" th:value="${keyword}"/>
                            <input type="hidden" name="page" th:value="${users.number}"/>
                            <button type="submit"
                                    th:class="${user.enabled} ? 'badge published' : 'badge hidden'"
                                    style="border:none; cursor:pointer; font-family:inherit;"
                                    th:text="${user.enabled} ? '✓ Hoạt động' : '✗ Đã khóa'"
                                    th:title="${user.enabled} ? 'Nhấn để khóa' : 'Nhấn để mở khóa'">
                            </button>
                        </form>
                    </td>

                    <td style="color:var(--text-muted); font-size:12.5px;"
                        th:text="${#temporals.format(user.createdAt, 'dd/MM/yyyy')}">01/01/2024</td>

                    <!-- Delete -->
                    <td>
                        <form th:action="@{/admin/users/delete/{id}(id=${user.id})}"
                              method="post" style="display:inline;"
                              onsubmit="return confirm('Xóa người dùng này? Hành động không thể hoàn tác!')">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <input type="hidden" name="keyword" th:value="${keyword}"/>
                            <input type="hidden" name="page" th:value="${users.number}"/>
                            <button type="submit" class="btn-sm danger">
                                <i class="fa-solid fa-trash"></i> Xóa
                            </button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <!-- Pagination -->
        <div th:if="${users.totalPages > 1}" class="pagination" style="margin-top:1.25rem;">
            <a th:if="${!users.first}"
               th:href="@{/admin/users(keyword=${keyword}, page=${users.number - 1})}"
               class="btn-page"><i class="fa-solid fa-chevron-left"></i></a>

            <th:block th:each="i : ${#numbers.sequence(0, users.totalPages - 1)}">
                <a th:href="@{/admin/users(keyword=${keyword}, page=${i})}"
                   th:text="${i + 1}"
                   th:class="${i == users.number} ? 'btn-page active' : 'btn-page'"></a>
            </th:block>

            <a th:if="${!users.last}"
               th:href="@{/admin/users(keyword=${keyword}, page=${users.number + 1})}"
               class="btn-page"><i class="fa-solid fa-chevron-right"></i></a>
        </div>

    </main>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
