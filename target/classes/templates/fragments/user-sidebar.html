<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<body>
<aside th:fragment="sidebar(activePage)" class="user-sidebar">
    <div class="user-sidebar-profile">
        <div class="user-avatar" style="display:flex; justify-content:center; align-items:center; margin-bottom:0.5rem">
            <img th:if="${user != null and user.avatarUrl != null and !#strings.isEmpty(user.avatarUrl)}"
                 th:src="${user.avatarUrl}" alt="Avatar"
                 style="width:80px; height:80px; border-radius:50%; object-fit:cover; border:3px solid var(--red)"/>
            <i th:if="${user == null or user.avatarUrl == null or #strings.isEmpty(user.avatarUrl)}"
               class="fa-solid fa-circle-user"
               style="font-size:80px; color:var(--red); display:block"></i>
        </div>

        <!-- Nút đổi avatar hiện ở tất cả các trang -->
        <form action="/profile/avatar" method="post" enctype="multipart/form-data"
              style="margin-top:0.5rem; text-align:center">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <label for="avatarInput"
                   style="cursor:pointer; font-size:0.78rem; padding:0.3rem 0.9rem;
                          display:inline-block; border-radius:999px;
                          background:var(--red); color:#fff; font-weight:500">
                <i class="fa-solid fa-camera"></i> Đổi ảnh
            </label>
            <input id="avatarInput" type="file" name="avatar" accept="image/*"
                   style="display:none" onchange="this.form.submit()"/>
        </form>

        <div class="user-sidebar-name" th:text="${user != null} ? ${user.username} : ''"
             style="margin-top:0.6rem"></div>
        <div class="user-sidebar-role" th:if="${user != null}">
            <span th:class="${user.role == 'ADMIN'} ? 'badge published' : 'badge draft'"
                  th:text="${user.role == 'ADMIN'} ? 'Quản trị viên' : 'Người dùng'"></span>
        </div>
    </div>

    <nav class="user-nav">
        <a href="/profile"
           th:class="${activePage == 'profile'} ? 'user-nav-item active' : 'user-nav-item'">
            <i class="fa-solid fa-circle-user"></i> Trang cá nhân
        </a>
        <a href="/user/articles"
           th:class="${activePage == 'articles'} ? 'user-nav-item active' : 'user-nav-item'">
            <i class="fa-solid fa-newspaper"></i> Bài viết của tôi
        </a>
        <a href="/user/articles/new"
           th:class="${activePage == 'new-article'} ? 'user-nav-item active' : 'user-nav-item'">
            <i class="fa-solid fa-pen-to-square"></i> Viết bài mới
        </a>
        <a href="/user/contact"
           th:class="${activePage == 'contact'} ? 'user-nav-item active' : 'user-nav-item'">
            <i class="fa-solid fa-envelope"></i> Liên hệ Admin
        </a>


        <div class="user-nav-divider"></div>

        <form th:action="@{/logout}" method="post" style="margin:0">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="user-nav-item danger"
                    style="width:100%; background:none; border:none; cursor:pointer; font:inherit; text-align:left">
                <i class="fa-solid fa-right-from-bracket"></i> Đăng xuất
            </button>
        </form>
    </nav>
</aside>
</body>
</html>
